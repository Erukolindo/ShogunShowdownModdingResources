<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .markdown-section {
            background: rgba(0,0,0,0.65);
            padding: 32px;
            border-radius: 6px;
        }

        .content {
            max-width: 1100px;
            margin: auto;
        }

        #bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            image-rendering: pixelated;
            background-repeat: repeat-x;
            background-position: top center;
        }

        image-rendering: pixelated;
    </style>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

    <!-- Replace with your own title and description. -->
    <title>Shogun Showdown Modding Guide</title>
    <meta name="description" content="Shogun Showdown Modding Guide.">

    <!-- Default Theme (see https://docsify.js.org/#/themes) -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dark.css">

</head>

<body>
    <div id="bg">
        <div class="bg-layer" id="bg0"></div>
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
        <div class="bg-layer" id="bg3"></div>

    <div id="app"></div>

            // Sidebar Configuration
            auto2top: true,
            loadSidebar: true,
            relativePath: true,
            maxLevel: 0,
            // Set subMaxLevel to 0 to remove automatic display of page table of contents (TOC) in Sidebar
            subMaxLevel: 3,

            // Search Plugin Configuration
            search: {
                placeholder: 'Type to search',
                noData: 'No matches found.',
                // Headline depth, 1 - 6
                depth: 2,
            }
        };
    </script>

    <!-- Required -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- Recommended -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>

                { img: "ImageAssets/bg/CrimsonShrine_1.png", range: 8 },
                { img: "ImageAssets/bg/CrimsonShrine_2.png", range: 12 },
                { img: "ImageAssets/bg/CrimsonShrine_3.png", range: 25 },
                { img: "ImageAssets/bg/CrimsonShrine_4.png", range: 27 }
            ]
        };

        function setBackground(path) {

            let key = path;

            if (!pageBackgrounds[key]) {
                const dir = path.replace(/[^\/]+$/, "");
                key = pageBackgrounds[dir] ? dir : "/";
            }

            const layers = pageBackgrounds[key];

            layers.forEach((l, i) => {
                const el = document.getElementById("bg" + i);
                el.style.backgroundImage = `url(${l.img})`;
                el.dataset.range = l.range;
            });
        }

        window.$docsify.plugins = [
            function (hook, vm) {

                hook.doneEach(function () {

                    const path = vm.route.path || "/";

                    setBackground(path);

                    updateScale();
                    updateBackground();
                });

            }
        ];

        function updateBackground() {

            const maxScroll =
                document.documentElement.scrollHeight - window.innerHeight;

            const scroll = window.scrollY;

            const scale = window.innerHeight / 120;

            for (let i = 0; i < 4; i++) {

                const layer = document.getElementById("bg" + i);
                const range = parseFloat(layer.dataset.range || 0);

                const progress = maxScroll > 0 ? scroll / maxScroll : 0;

                const pixelOffset = Math.round(progress * range);

                const displayOffset = pixelOffset * scale;

                layer.style.transform =
                    `translateY(${-displayOffset}px)`;
            }
        }

        window.addEventListener("scroll", updateBackground);

        function updateScale() {

            const scale = window.innerHeight / 120;

            const scaledHeight = 148 * scale;

            document.querySelectorAll(".bg-layer")
                .forEach(layer => {
                    layer.style.height = `${scaledHeight}px`;
                    layer.style.backgroundSize = `auto ${scaledHeight}px`;
                });
        }

        window.addEventListener("resize", () => {
            updateScale();
            updateBackground();
        });
    </script>

</body>
</html>
